services:
  - type: web
    name: shopcart
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shopcart-db
          property: connectionString

databases:
  - name: shopcart-db
    databaseName: shopcart
    user: shopcart
