{% extends "base.html" %}
{% block title %}Edit {{ product.name }} — Admin{% endblock %}
{% block content %}

<div class="admin-layout">
  <aside class="admin-sidebar">
    <h3>⚙ Admin Panel</h3>
    <nav>
      <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
      <a href="{{ url_for('admin_products') }}" class="active">📦 Products</a>
      <a href="{{ url_for('admin_orders') }}">🧾 Orders</a>
      <a href="{{ url_for('index') }}">← Back to Shop</a>
    </nav>
  </aside>

  <div class="admin-main">
    <h1 class="admin-title">Edit Product</h1>
    <form method="post" class="admin-form">
      <div class="form-row">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" name="name" value="{{ product.name }}" required>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" name="category" value="{{ product.category }}" required list="cats">
          <datalist id="cats">{% for c in categories %}<option value="{{ c }}">{% endfor %}</datalist>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" name="price" value="{{ product.price }}" required min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="stock" value="{{ product.stock }}" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" name="image" value="{{ product.image }}">
        {% if product.image %}<img src="{{ product.image }}" class="img-preview">{% endif %}
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3">{{ product.description }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating</label>
          <input type="number" name="rating" value="{{ product.rating }}" min="0" max="5" step="0.1">
        </div>
        <div class="form-group">
          <label>Review Count</label>
          <input type="number" name="rating_count" value="{{ product.rating_count }}" min="0">
        </div>
      </div>
      <label class="check-row"><input type="checkbox" name="featured" {% if product.featured %}checked{% endif %}> Mark as Featured</label>
      <div class="form-actions">
        <button class="btn btn--primary" type="submit">Save Changes</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn--outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
