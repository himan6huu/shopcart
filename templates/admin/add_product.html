{% extends "base.html" %}
{% block title %}Add Product — Admin{% endblock %}
{% block content %}

<div class="admin-layout">
  <aside class="admin-sidebar">
    <h3>⚙ Admin Panel</h3>
    <nav>
      <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
      <a href="{{ url_for('admin_products') }}" class="active">📦 Products</a>
      <a href="{{ url_for('admin_orders') }}">🧾 Orders</a>
      <a href="{{ url_for('index') }}">← Back to Shop</a>
    </nav>
  </aside>

  <div class="admin-main">
    <h1 class="admin-title">Add Product</h1>
    <form method="post" class="admin-form">
      <div class="form-row">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" name="name" required placeholder="Wireless Headphones">
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" name="category" required list="cats" placeholder="Electronics">
          <datalist id="cats">{% for c in categories %}<option value="{{ c }}">{% endfor %}</datalist>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" name="price" required min="0" step="0.01" placeholder="4999">
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="stock" value="0" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" name="image" placeholder="https://images.unsplash.com/…">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Short product description…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating (0–5)</label>
          <input type="number" name="rating" value="4.0" min="0" max="5" step="0.1">
        </div>
        <div class="form-group">
          <label>Review Count</label>
          <input type="number" name="rating_count" value="0" min="0">
        </div>
      </div>
      <label class="check-row"><input type="checkbox" name="featured"> Mark as Featured</label>
      <div class="form-actions">
        <button class="btn btn--primary" type="submit">Add Product</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn--outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
