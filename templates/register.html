{% extends "base.html" %}
{% block title %}Register — ShopCart{% endblock %}
{% block content %}

<section class="auth-page">
  <div class="auth-card">
    <h1>Create Account 🎉</h1>
    <p class="auth-sub">Join thousands of happy shoppers.</p>

    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Rahul Sharma" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password2" placeholder="Repeat password" required>
      </div>
      <button class="btn btn--primary btn--full btn--lg" type="submit">Create Account →</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</section>

{% endblock %}
