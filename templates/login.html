{% extends "base.html" %}
{% block title %}Login — ShopCart{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">👋</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to track your orders and wishlist.</p>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.88rem;">
        <label class="check-row"><input type="checkbox" name="remember"> Remember me</label>
        <a href="{{ url_for('forgot_password') }}" style="color:var(--green);font-weight:600;">Forgot password?</a>
      </div>
      <button class="btn btn--primary btn--full btn--lg" type="submit">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
    <div class="auth-hint"><strong>Admin demo:</strong> admin@shopcart.com / admin123</div>
  </div>
</section>
{% endblock %}
