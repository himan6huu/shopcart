{% extends "base.html" %}
{% block title %}Reset Password — ShopCart{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🔑</div>
    <h1>Set New Password</h1>
    <p class="auth-sub">Choose a strong password for your account.</p>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required minlength="6" autofocus>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password2" placeholder="Repeat password" required>
      </div>
      <button class="btn btn--primary btn--full btn--lg" type="submit">Reset Password →</button>
    </form>
  </div>
</section>
{% endblock %}
